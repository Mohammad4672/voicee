<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruba Message</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  color: white;

  /* 🌌 glass midnight blue */
  background: radial-gradient(circle at top, #0a1a2f 0%, #02030a 60%, #000000 100%);
}

/* START BUTTON */
#startBtn {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: white;
  color: black;
}

/* GLOW TEXT */
#loveText {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 70px;
  font-weight: bold;
  display: none;
  color: #ff4d6d;

  text-shadow:
    0 0 10px #ff4d6d,
    0 0 20px #ff4d6d,
    0 0 40px #ff4d6d,
    0 0 80px #ff4d6d;

  animation: glowPulse 1.5s infinite;
}

@keyframes glowPulse {
  0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.6; }
  50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.6; }
}

/* BOX */
#box {
  display: none;
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 100px;
  cursor: pointer;
}

/* HEARTS */
.heart {
  position: absolute;
  font-size: 25px;
  animation: floatUp 3s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-400px); opacity: 0; }
}

/* STAR */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10px); opacity: 1; }
  to { transform: translateY(100vh); opacity: 0; }
}

/* FINAL TEXT */
#finalText {
  position: absolute;
  width: 100%;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 65px;
  font-weight: bold;
  display: none;
  color: red;
  text-shadow: 0 0 20px red, 0 0 40px red;
}
</style>
</head>

<body>

<button id="startBtn">📩 Open Message</button>

<audio id="audio" src="voice.mp3"></audio>

<div id="loveText">Ruba ❤️</div>
<div id="box">🎁</div>
<div id="finalText">بحبك ❤️</div>

<script>
const audio = document.getElementById("audio");
const startBtn = document.getElementById("startBtn");
const loveText = document.getElementById("loveText");
const box = document.getElementById("box");
const finalText = document.getElementById("finalText");

let finished = false;

/* STARS */
function createStars() {
  for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.className = "star";

    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.top = Math.random() * window.innerHeight + "px";
    star.style.animationDuration = (Math.random() * 5 + 3) + "s";

    document.body.appendChild(star);
  }
}

/* START */
startBtn.onclick = async () => {
  startBtn.style.display = "none";

  createStars();

  loveText.style.display = "block";

  try {
    audio.currentTime = 0;
    await audio.play();
  } catch (e) {}

  audio.onended = () => {
    finished = true;
    loveText.style.display = "none";
    box.style.display = "block";
  };
};

/* BOX CLICK */
box.onclick = () => {
  if (!finished) return;

  box.style.display = "none";
  finalText.style.display = "block";

  for (let i = 0; i < 250; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = Math.random() * window.innerHeight + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
};
</script>

</body>
</html>
